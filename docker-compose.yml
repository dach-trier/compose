services:
  tunnel:
    image: cloudflare/cloudflared:2026.3.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run

    env_file:
      - ./env/cloudflared.env

    networks:
      - web


  public-server:
    image: ghcr.io/dach-trier/public-server:v1.0.0
    restart: unless-stopped

    env_file:
      - ./env/public.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: "/secrets/public-sa.json"
    volumes:
      - ./secrets/public-sa.json:/secrets/public-sa.json

    networks:
      - web

networks:
  web:
    driver: bridge
